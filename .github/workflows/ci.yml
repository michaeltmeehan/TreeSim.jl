name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TreeSim.jl
    strategy:
      fail-fast: false
      matrix:
        julia-version:
          - '1.11'
          - '1.12'

    steps:
      - name: Checkout TreeSim.jl
        uses: actions/checkout@v5
        with:
          path: TreeSim.jl

      - name: Checkout EpiSim.jl
        uses: actions/checkout@v5
        with:
          repository: michaeltmeehan/EpiSim.jl
          path: EpiSim.jl

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Instantiate dependencies
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run tests
        run: julia --project=. -e 'using Pkg; Pkg.test()'
